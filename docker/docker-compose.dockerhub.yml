services:
  db:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: ghost_labor
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - ghost_labor_db_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ghost_labor"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    image: nhatcuong/ghost-labor:latest
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/ghost_labor?schema=public
      APP_BASE_URL: http://localhost:3000
      NODE_ENV: production
    depends_on:
      db:
        condition: service_healthy
    command: sh -c "npx prisma migrate deploy && npm run start"
    ports:
      - "3000:3000"

  worker:
    image: nhatcuong/ghost-labor:latest
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/ghost_labor?schema=public
      APP_BASE_URL: http://web:3000
      NODE_ENV: production
    depends_on:
      db:
        condition: service_healthy
      web:
        condition: service_started
    command: sh -c "npx prisma migrate deploy && npm run worker"

volumes:
  ghost_labor_db_data:
